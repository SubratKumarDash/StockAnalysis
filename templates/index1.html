<!DOCTYPE html>
<html>
<head>
<title>Dashboard - AI Test Data Agent</title>
<style>
body { font-family: Arial; background:#f9f9f9; }
.container { max-width:800px; margin:auto; padding:20px; background:white; border-radius:8px; margin-top:50px; box-shadow:0 0 10px rgba(0,0,0,0.2); }
input[type=text] { width:80%; padding:10px; margin-right:10px; }
select { padding:10px; margin-right:10px; }
input[type=submit] { padding:10px 20px; background:#4CAF50; color:white; border:none; border-radius:4px; cursor:pointer; }
input[type=submit]:hover { background:#45a049; }
a { text-decoration:none; color:#f44336; }
#status { font-weight:bold; color:#333; margin-top:10px; }
</style>
</head>
<body>
<div class="container">
<h2>AI Test Data Generator Agent</h2>
<form id="generateForm">
<input type="text" name="prompt" placeholder="Describe your test data prompt" required/>
<select name="file_format">
<option value="csv">CSV</option>
<option value="excel">Excel</option>
<option value="json">JSON</option>
</select>
<input type="submit" value="Generate Data">
</form>
<div id="status"></div>
<div id="download"></div>
<br/><a href="/logout">Logout</a>
</div>

<script>
document.getElementById("generateForm").addEventListener("submit", async function(e){
    e.preventDefault();
    let form = e.target;
    let formData = new FormData(form);
    document.getElementById("status").innerText = "LLM is working to generate data...";
    document.getElementById("download").innerHTML = "";
    try {
        let res = await fetch("/generate", {method:"POST", body: formData});
        let data = await res.json();
        document.getElementById("status").innerText = data.message;
        document.getElementById("download").innerHTML = `<a href="${data.file}" download>Download Generated File</a>`;
    } catch(err){
        document.getElementById("status").innerText = "Error generating data!";
    }
});
</script>
</body>
</html>
